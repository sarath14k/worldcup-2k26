<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FIFA World Cup 2026 Interactive Roadmap & Bracket Predictor</title>
    <meta name="description" content="Explore the full 2026 FIFA World Cup roadmap, check groups, view match schedules across USA, Canada & Mexico, and use the interactive bracket predictor to pick your champion!" />
    <meta name="keywords" content="FIFA World Cup 2026, World Cup Bracket, World Cup Predictor, World Cup Roadmap, Group Stage, Knockout Stage, Soccer, Football" />
    <meta name="author" content="Antigravity Team" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10b981" />
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (let registration of registrations) {
            registration.unregister();
          }
        }).catch(err => console.log('SW unregistration failed:', err));
      }
    </script>
  </head>
  <body class="bg-brand-darkBg text-slate-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
